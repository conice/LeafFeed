name: "Build Commit"
on:
    push:
        branches:
            - "**"
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 17

            - uses: gradle/actions/setup-gradle@v5
            - name: Assemble GitHub release with Gradle Wrapper
              run: ./gradlew assembleGithubRelease

            - uses: actions/upload-artifact@v5
              with:
                  name: LeafFeed-GitHub-Build-${{ github.sha }}
                  path: app/build/outputs/apk/github/release/*.apk

            - name: Publish GitHub release
              if: startsWith(github.ref, 'refs/tags/')
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  gh release create "$TAG_NAME" \
                    app/build/outputs/apk/github/release/*.apk \
                    --verify-tag \
                    --title "$TAG_NAME" \
                    --generate-notes
