name: "Build Commit"
on:
    push:
        branches:
            - "**"
        tags:
            - "v*"

permissions:
    contents: write

concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 17

            - uses: gradle/actions/setup-gradle@v5
            - name: Assemble GitHub debug snapshot
              if: ${{ !startsWith(github.ref, 'refs/tags/') }}
              run: sh ./gradlew assembleGithubDebug --build-cache

            - name: Configure release signing
              if: ${{ startsWith(github.ref, 'refs/tags/') }}
              env:
                  LEAFFEED_SIGNING_STORE_FILE: ${{ runner.temp }}/leaffeed-release.keystore
                  LEAFFEED_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  LEAFFEED_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
                  LEAFFEED_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
                  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
              run: |
                  set -euo pipefail
                  for variable in ANDROID_KEYSTORE_BASE64 LEAFFEED_SIGNING_STORE_PASSWORD LEAFFEED_SIGNING_KEY_ALIAS LEAFFEED_SIGNING_KEY_PASSWORD; do
                      if [ -z "${!variable:-}" ]; then
                          echo "::error::Missing required secret for tagged release signing: ${variable}"
                          exit 1
                      fi
                  done
                  printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$LEAFFEED_SIGNING_STORE_FILE"
                  chmod 600 "$LEAFFEED_SIGNING_STORE_FILE"
                  keytool -list -keystore "$LEAFFEED_SIGNING_STORE_FILE" \
                      -storepass "$LEAFFEED_SIGNING_STORE_PASSWORD" \
                      -alias "$LEAFFEED_SIGNING_KEY_ALIAS" >/dev/null

            - name: Assemble signed GitHub release
              if: ${{ startsWith(github.ref, 'refs/tags/') }}
              env:
                  LEAFFEED_SIGNING_STORE_FILE: ${{ runner.temp }}/leaffeed-release.keystore
                  LEAFFEED_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  LEAFFEED_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
                  LEAFFEED_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
              run: sh ./gradlew assembleGithubRelease --build-cache

            - uses: actions/upload-artifact@v5
              with:
                  name: LeafFeed-GitHub-Build-${{ github.sha }}
                  path: |
                      app/build/outputs/apk/github/debug/*.apk
                      app/build/outputs/apk/github/release/*.apk
                  if-no-files-found: error

            - name: Publish GitHub release
              if: startsWith(github.ref, 'refs/tags/')
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  gh release create "$TAG_NAME" \
                    app/build/outputs/apk/github/release/*.apk \
                    --verify-tag \
                    --title "$TAG_NAME" \
                    --generate-notes
