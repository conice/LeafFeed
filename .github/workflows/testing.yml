name: Run Unit Tests

on:
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v5
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Unit Test with Gradle Wrapper
      run: sh ./gradlew testGithubReleaseUnitTest --max-workers=2
    - name: Lint GitHub release
      run: sh ./gradlew lintGithubRelease --max-workers=2
